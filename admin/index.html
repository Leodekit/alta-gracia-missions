<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control | Alta Gracia Missions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <style>
    :root {
      --primary: #0a2463;
      --primary-light: #1e3a8a;
      --accent: #fbbf24;
      --bg: #f8fafc;
      --text: #1e293b;
      --text-light: #64748b;
      --glass: rgba(255, 255, 255, 0.85);
      --border: rgba(226, 232, 240, 0.8);
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ---- AUTH SCREEN ---- */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a2463 0%, #1e40af 100%);
      padding: 20px;
    }

    .auth-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
    }

    .auth-logo { width: 100px; margin-bottom: 24px; }
    .auth-card h1 { font-size: 28px; margin-bottom: 8px; color: var(--primary); font-weight: 800; }
    .auth-card p { color: var(--text-light); font-size: 14px; margin-bottom: 32px; }

    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--primary); }

    input[type="password"], input[type="text"], textarea, select {
      width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e2e8f0;
      background: white; font-family: inherit; font-size: 14px; transition: all 0.2s;
    }

    input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(10, 36, 99, 0.1); }

    .btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: var(--primary); color: white; font-weight: 700; font-size: 15px;
      cursor: pointer; transition: all 0.2s;
    }

    .btn:hover { background: var(--primary-light); transform: translateY(-1px); }

    /* ---- DASHBOARD ---- */
    .app-container { display: flex; min-height: 100vh; display: none; }
    .sidebar {
      width: 280px; background: white; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 32px 20px; position: fixed; height: 100vh;
    }

    .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding: 0 12px; }
    .sidebar-logo img { width: 32px; }
    .sidebar-logo span { font-weight: 800; font-size: 18px; color: var(--primary); }

    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px;
      color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 14px;
      margin-bottom: 8px; transition: all 0.2s; cursor: pointer;
    }

    .nav-item:hover { background: #f1f5f9; color: var(--primary); }
    .nav-item.active { background: #eff6ff; color: var(--primary); }
    .nav-item svg { width: 20px; height: 20px; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer { margin-top: auto; padding: 20px 12px 0; border-top: 1px solid #f1f5f9; }
    .logout-btn { color: #ef4444; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }

    .main-content { flex: 1; margin-left: 280px; padding: 60px; max-width: 1200px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px; }
    .page-header h2 { font-size: 32px; font-weight: 800; color: var(--primary); }

    .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .content-card {
      background: white; border-radius: 24px; padding: 28px; border: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
    }

    .content-card:hover { transform: translateY(-6px); box-shadow: var(--shadow); border-color: var(--primary); }
    .card-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--primary-light); background: #eff6ff; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; display: inline-block; }
    .card-title { font-weight: 800; font-size: 20px; margin-bottom: 10px; color: var(--primary); line-height: 1.3; }
    .card-date { font-size: 13px; color: var(--text-light); font-weight: 500; }

    .add-btn {
      background: var(--primary); color: white; border: none; padding: 12px 24px;
      border-radius: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer;
    }

    /* ---- EDITOR MODAL ---- */
    .editor-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center; z-index: 1000; padding: 40px;
    }

    .editor-modal.open { display: flex; }
    .editor-card {
      background: white; width: 100%; max-width: 1100px; height: 90vh; border-radius: 32px;
      display: flex; flex-direction: column; overflow: hidden;
    }

    .editor-header { padding: 32px 40px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .editor-header h3 { font-size: 24px; font-weight: 800; color: var(--primary); }

    .editor-body { flex: 1; overflow-y: auto; padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .editor-footer { padding: 32px 40px; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; gap: 16px; }
    .btn-secondary { background: #f1f5f9; color: var(--text); border: none; padding: 12px 28px; border-radius: 14px; font-weight: 700; cursor: pointer; }

    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: #0f172a; color: white; padding: 14px 28px; border-radius: 16px;
      font-weight: 600; font-size: 14px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
      display: none; z-index: 2000;
    }

    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; z-index: 3000;
    }

    .spinner {
      width: 48px; height: 48px; border: 5px solid #f3f3f3;
      border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-container">
    <div class="auth-card">
      <img src="../images/logo.png" alt="Alta Gracia Missions" class="auth-logo">
      <h1>Mission Control</h1>
      <p>Secure login to manage your mission content.</p>
      
      <div class="form-group">
        <label for="githubToken">GitHub Personal Access Token</label>
        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
        <div style="font-size: 11px; color: #64748b; margin-top: 12px; line-height: 1.6;">
          Don't have a token? <a href="https://github.com/settings/tokens/new?scopes=repo&description=Alta%20Gracia%20CMS" target="_blank" style="color: #0a2463; font-weight: 700; text-decoration: underline;">Create one here</a><br>
          (Make sure to select the <strong>'repo'</strong> scope).
        </div>
      </div>
      
      <button id="loginBtn" class="btn">Access Dashboard</button>
    </div>
  </div>

  <!-- APP CONTAINER -->
  <div id="appContainer" class="app-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../images/logo.png" alt="">
        <span>AG Missions</span>
      </div>
      
      <nav>
        <div class="nav-item active" data-section="blogPosts">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          Blog Posts
        </div>
        <div class="nav-item" data-section="eventPosts">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          Events
        </div>
      </nav>
      
      <div class="sidebar-footer">
        <div id="logoutBtn" class="logout-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Sign Out
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <h2 id="sectionTitle">Blog Posts</h2>
          <p id="sectionDesc" style="color: var(--text-light); font-size: 15px; font-weight: 500;">Manage updates from the mission field.</p>
        </div>
        <button id="addBtn" class="add-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Create New
        </button>
      </header>

      <div id="contentGrid" class="content-grid"></div>
    </main>
  </div>

  <!-- EDITOR MODAL -->
  <div id="editorModal" class="editor-modal">
    <div class="editor-card">
      <header class="editor-header">
        <h3 id="editorTitle">Edit Post</h3>
        <span id="editorStatus" style="font-size: 13px; font-weight: 700; color: var(--primary-light);"></span>
      </header>
      
      <div id="editorFields" class="editor-body"></div>
      
      <footer class="editor-footer">
        <button id="cancelBtn" class="btn-secondary">Cancel</button>
        <button id="saveBtn" class="btn" style="width: auto; padding: 12px 40px;">Save to GitHub</button>
      </footer>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div id="toast"></div>

  <script>
    console.log("Mission Control: Initializing...");

    // Alta Gracia Mission Control — Logic
    const CONFIG = {
      owner: 'Leodekit',
      repo: 'alta-gracia-missions',
      branch: 'main',
      sections: {
        blogPosts: {
          folder: 'content/blog',
          label: 'Blog Posts',
          desc: 'Manage updates from the mission field.',
          fields: [
            { name: 'title', label: 'Title', type: 'text' },
            { name: 'date', label: 'Publish Date', type: 'datetime-local' },
            { name: 'tag', label: 'Category', type: 'select', options: ['Mission Update', 'Events', 'Impact Report', 'Story'] },
            { name: 'image', label: 'Image URL (from /images/...)', type: 'text' },
            { name: 'imageAlt', label: 'Image Alt Text', type: 'text' },
            { name: 'readTime', label: 'Read Time', type: 'text' },
            { name: 'description', label: 'Short Description', type: 'textarea' },
            { name: 'body', label: 'Main Content (Markdown)', type: 'markdown' }
          ]
        },
        eventPosts: {
          folder: 'content/events',
          label: 'Events',
          desc: 'Manage upcoming mission events.',
          fields: [
            { name: 'title', label: 'Event Name', type: 'text' },
            { name: 'eventDate', label: 'Event Date', type: 'datetime-local' },
            { name: 'location', label: 'Location', type: 'text' },
            { name: 'image', label: 'Image URL', type: 'text' },
            { name: 'description', label: 'Description (Markdown)', type: 'markdown' }
          ]
        }
      }
    };

    let GITHUB_TOKEN = localStorage.getItem('ag_missions_token');
    let currentSection = 'blogPosts';
    let currentFileSha = null;
    let currentFilePath = null;

    // ---- AUTH ----
    function checkAuth() {
      console.log("Checking Auth State...");
      if (GITHUB_TOKEN) {
        console.log("Token found, showing dashboard.");
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'flex';
        loadSection(currentSection);
      } else {
        console.log("No token found, showing login screen.");
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
      }
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
      console.log("Access Dashboard clicked.");
      const token = document.getElementById('githubToken').value.trim();
      if (!token) return showToast('Please enter a valid token.');
      
      GITHUB_TOKEN = token;
      localStorage.setItem('ag_missions_token', token);
      checkAuth();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      GITHUB_TOKEN = null;
      localStorage.removeItem('ag_missions_token');
      checkAuth();
    });

    // ---- DATA FETCHING ----
    async function ghFetch(path, options = {}) {
      const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/${path}`;
      const response = await fetch(url, {
        ...options,
        headers: {
          'Authorization': `token ${GITHUB_TOKEN}`,
          'Accept': 'application/vnd.github.v3+json',
          ...options.headers
        }
      });
      
      if (response.status === 401) {
        showToast('Session expired or invalid token.');
        localStorage.removeItem('ag_missions_token');
        window.location.reload();
      }
      
      return response;
    }

    async function loadSection(sectionId) {
      currentSection = sectionId;
      const section = CONFIG.sections[sectionId];
      
      document.getElementById('sectionTitle').textContent = section.label;
      document.getElementById('sectionDesc').textContent = section.desc;
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.section === sectionId);
      });
      
      showLoading(true);
      const grid = document.getElementById('contentGrid');
      grid.innerHTML = '';
      
      try {
        const res = await ghFetch(`contents/${section.folder}`);
        if (!res.ok) throw new Error('Folder not found');
        
        const files = await res.json();
        const jsonFiles = files.filter(f => f.name.endsWith('.json'));
        
        if (jsonFiles.length === 0) {
          grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-light); padding: 40px;">No content found. Create your first post!</div>';
        }
        
        for (const file of jsonFiles) {
          const card = document.createElement('div');
          card.className = 'content-card';
          card.innerHTML = `
            <div class="card-tag">${section.label.slice(0, -1)}</div>
            <div class="card-title">${file.name.replace('.json', '').split('-').slice(3).join(' ') || file.name}</div>
            <div class="card-date">${file.name.slice(0, 10)}</div>
          `;
          card.onclick = () => openEditor(file.path, file.sha);
          grid.appendChild(card);
        }
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #ef4444; padding: 40px;">Error loading content. Check your token and permissions.</div>';
      } finally {
        showLoading(false);
      }
    }

    async function openEditor(path = null, sha = null) {
      currentFilePath = path;
      currentFileSha = sha;
      const section = CONFIG.sections[currentSection];
      const fieldsContainer = document.getElementById('editorFields');
      fieldsContainer.innerHTML = '';
      
      document.getElementById('editorTitle').textContent = path ? `Edit ${section.label.slice(0, -1)}` : `New ${section.label.slice(0, -1)}`;
      document.getElementById('editorModal').classList.add('open');
      
      let data = {};
      if (path) {
        showLoading(true);
        try {
          const res = await ghFetch(`contents/${path}`);
          const fileData = await res.json();
          data = JSON.parse(atob(fileData.content));
        } catch (err) {
          showToast('Error loading file data.');
        } finally {
          showLoading(false);
        }
      }
      
      section.fields.forEach(field => {
        const group = document.createElement('div');
        group.className = 'form-group';
        if (field.type === 'markdown' || field.type === 'textarea') group.style.gridColumn = '1 / -1';
        
        let inputHtml = '';
        const val = data[field.name] || '';
        
        if (field.type === 'select') {
          inputHtml = `<select id="field_${field.name}">${field.options.map(o => `<option value="${o}" ${o === val ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
        } else if (field.type === 'textarea' || field.type === 'markdown') {
          inputHtml = `<textarea id="field_${field.name}" rows="8">${val}</textarea>`;
        } else if (field.type === 'datetime-local') {
          const d = val ? new Date(val) : new Date();
          const dateStr = d.toISOString().slice(0, 16);
          inputHtml = `<input type="datetime-local" id="field_${field.name}" value="${dateStr}">`;
        } else {
          inputHtml = `<input type="${field.type}" id="field_${field.name}" value="${val}">`;
        }
        
        group.innerHTML = `<label>${field.label}</label>${inputHtml}`;
        fieldsContainer.appendChild(group);
      });
    }

    async function saveContent() {
      const section = CONFIG.sections[currentSection];
      const data = {};
      section.fields.forEach(f => {
        data[f.name] = document.getElementById(`field_${f.name}`).value;
      });
      
      if (!currentFilePath) {
        const date = new Date(data.date || new Date());
        const dateStr = date.toISOString().slice(0, 10);
        const slug = data.title.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        currentFilePath = `${section.folder}/${dateStr}-${slug}.json`;
      }
      
      showLoading(true);
      try {
        const res = await ghFetch(`contents/${currentFilePath}`, {
          method: 'PUT',
          body: JSON.stringify({
            message: `Update ${currentFilePath} via Mission Control`,
            content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
            sha: currentFileSha,
            branch: CONFIG.branch
          })
        });
        
        if (res.ok) {
          showToast('Successfully saved to GitHub!');
          closeEditor();
          loadSection(currentSection);
        } else {
          const err = await res.json();
          showToast(`Error: ${err.message}`);
        }
      } catch (err) {
        showToast('Failed to connect to GitHub.');
      } finally {
        showLoading(false);
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    function showLoading(show) {
      document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }

    function closeEditor() {
      document.getElementById('editorModal').classList.remove('open');
      currentFilePath = null;
      currentFileSha = null;
    }

    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => loadSection(el.dataset.section));
    });

    document.getElementById('addBtn').addEventListener('click', () => openEditor());
    document.getElementById('cancelBtn').addEventListener('click', closeEditor);
    document.getElementById('saveBtn').addEventListener('click', saveContent);

    window.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeEditor();
    });

    // Start
    checkAuth();
  </script>
</body>
</html>
