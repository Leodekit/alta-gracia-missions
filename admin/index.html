<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control | Alta Gracia Missions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="../images/logo.png">
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-container">
    <div class="auth-card">
      <img src="../images/logo.png" alt="Alta Gracia Missions" class="auth-logo">
      <h1>Mission Control</h1>
      <p>Secure login to manage your mission content.</p>
      
      <div class="form-group">
        <label for="githubToken">GitHub Personal Access Token</label>
        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
        <div style="font-size: 11px; color: #64748b; margin-top: 8px;">
          Don't have a token? <a href="https://github.com/settings/tokens/new?scopes=repo&description=Alta%20Gracia%20CMS" target="_blank" style="color: #0a2463; font-weight: 600;">Create one here</a> (select 'repo' scope).
        </div>
      </div>
      
      <button id="loginBtn" class="btn">Access Dashboard</button>
    </div>
  </div>

  <!-- APP CONTAINER -->
  <div id="appContainer" class="app-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../images/logo.png" alt="">
        <span>AG Missions</span>
      </div>
      
      <nav>
        <div class="nav-item active" data-section="blogPosts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          Blog Posts
        </div>
        <div class="nav-item" data-section="eventPosts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          Events
        </div>
      </nav>
      
      <div class="sidebar-footer">
        <div id="logoutBtn" class="logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Sign Out
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <header class="page-header">
        <div>
          <h2 id="sectionTitle">Blog Posts</h2>
          <p id="sectionDesc" style="color: var(--text-light); font-size: 14px;">Manage updates from the mission field.</p>
        </div>
        <button id="addBtn" class="add-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Create New
        </button>
      </header>

      <div id="contentGrid" class="content-grid">
        <!-- Cards will be injected here -->
      </div>
    </main>
  </div>

  <!-- EDITOR MODAL -->
  <div id="editorModal" class="editor-modal">
    <div class="editor-card">
      <header class="editor-header">
        <h3 id="editorTitle">Edit Post</h3>
        <span id="editorStatus" style="font-size: 12px; font-weight: 600;"></span>
      </header>
      
      <div id="editorFields" class="editor-body">
        <!-- Form fields will be injected here -->
      </div>
      
      <footer class="editor-footer">
        <button id="cancelBtn" class="btn-secondary">Cancel</button>
        <button id="saveBtn" class="btn" style="width: auto; padding: 10px 32px;">Save Changes</button>
      </footer>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div id="toast"></div>

  <script src="admin.js"></script>
</body>
</html>
