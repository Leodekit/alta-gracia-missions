backend:
  name: github
  repo: Leodekit/alta-gracia-missions
  branch: main # or master, depending on your default branch
  auth_endpoint: https://decap-oauth-server.onrender.com/auth

media_folder: "images/uploads" # Where images will be saved
public_folder: "/images/uploads" # Where they are served from

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Tag", name: "tag", widget: "select", options: ["Mission Update", "Events", "Impact Report", "Story"] }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
      - { label: "Read Time (e.g. 5 min read)", name: "readTime", widget: "string" }
      - { label: "CTA Text", name: "cta", widget: "string", default: "Read more" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "events"
    label: "Events"
    folder: "content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Event Date", name: "eventDate", widget: "datetime" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "markdown" }
      - { label: "Registration Link", name: "link", widget: "string", required: false }
